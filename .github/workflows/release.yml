name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-release-artifacts:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked -p rustcmdpev --bin rustcmdpev --target ${{ matrix.target }}

      - name: Package Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE="rustcmdpev-${VERSION}-${{ matrix.target }}"
          mkdir "$PACKAGE"
          cp "target/${{ matrix.target }}/release/rustcmdpev" "$PACKAGE/"
          cp README.md LICENSE "$PACKAGE/"
          cp -R examples "$PACKAGE/"
          tar -czf "${PACKAGE}.tar.gz" "$PACKAGE"
          shasum -a 256 "${PACKAGE}.tar.gz" > "${PACKAGE}.tar.gz.sha256"

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart("v")
          $package = "rustcmdpev-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $package | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/rustcmdpev.exe" "$package/"
          Copy-Item README.md, LICENSE "$package/"
          Copy-Item examples "$package/" -Recurse
          Compress-Archive -Path $package -DestinationPath "$package.zip"
          (Get-FileHash "$package.zip" -Algorithm SHA256).Hash | Out-File "$package.zip.sha256" -Encoding ascii

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustcmdpev-${{ matrix.target }}
          path: |
            rustcmdpev-*-${{ matrix.target }}.${{ matrix.archive_ext }}
            rustcmdpev-*-${{ matrix.target }}.${{ matrix.archive_ext }}.sha256
