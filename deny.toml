[graph]
all-features = true

[licenses]
allow = [
  "Apache-2.0",
  "MIT",
  # MPL-2.0 is a weak file-level copyleft (OSI approved); obligations only
  # attach when modifying the MPL-licensed files, not when depending on them.
  # Required by `colored`.
  "MPL-2.0",
  "Unicode-3.0",
]

[advisories]
version = 2
yanked = "deny"

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
