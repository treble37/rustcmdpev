tag_pattern = "v[0-9]*"

[changelog]
header = "# Changelog\n\nAll notable changes to `rustcmdpev` are documented here.\n"
body = """
{% if version %}## {{ version }} - {{ timestamp | date(format="%Y-%m-%d") }}{% else %}## Unreleased{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first }}
{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = false
filter_unconventional = false
split_commits = false
tag_pattern = "v[0-9]*"

[commit_parsers]
message = "^Add "
group = "Added"

[[commit_parsers]]
message = "^Implement "
group = "Changed"

[[commit_parsers]]
message = "^Fix "
group = "Fixed"

[[commit_parsers]]
message = "^Update "
group = "Changed"

[[commit_parsers]]
message = ".*"
group = "Other"
